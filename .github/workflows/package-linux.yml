name: Package Linux

on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # ─── Stage 1: Build agent binaries ───

  agent-x86_64-linux:
    name: Agent (x86_64-unknown-linux-musl)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl
      - uses: Swatinem/rust-cache@v2
        with:
          key: agent-x86_64-linux
      - name: Install musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - name: Build agent
        env:
          CARGO_PROFILE_RELEASE_STRIP: symbols
        run: make agents/x86_64-unknown-linux-musl/newt-agent
      - uses: actions/upload-artifact@v4
        with:
          name: agent-x86_64-unknown-linux-musl
          path: agents/x86_64-unknown-linux-musl/
          retention-days: 7

  agent-aarch64-linux:
    name: Agent (aarch64-unknown-linux-musl)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-musl
      - uses: Swatinem/rust-cache@v2
        with:
          key: agent-aarch64-linux
      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross
      - name: Build agent
        env:
          CARGO_PROFILE_RELEASE_STRIP: symbols
        run: |
          cross build --release --target aarch64-unknown-linux-musl -p newt-agent
          mkdir -p agents/aarch64-unknown-linux-musl
          cp target/aarch64-unknown-linux-musl/release/newt-agent agents/aarch64-unknown-linux-musl/
      - uses: actions/upload-artifact@v4
        with:
          name: agent-aarch64-unknown-linux-musl
          path: agents/aarch64-unknown-linux-musl/
          retention-days: 7

  agent-aarch64-darwin:
    name: Agent (aarch64-apple-darwin)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
      - uses: Swatinem/rust-cache@v2
        with:
          key: agent-aarch64-darwin
      - name: Build agent
        env:
          CARGO_PROFILE_RELEASE_STRIP: symbols
        run: make agents/aarch64-apple-darwin/newt-agent
      - uses: actions/upload-artifact@v4
        with:
          name: agent-aarch64-apple-darwin
          path: agents/aarch64-apple-darwin/
          retention-days: 7

  agent-x86_64-darwin:
    name: Agent (x86_64-apple-darwin)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin
      - uses: Swatinem/rust-cache@v2
        with:
          key: agent-x86_64-darwin
      - name: Build agent
        env:
          CARGO_PROFILE_RELEASE_STRIP: symbols
        run: make agents/x86_64-apple-darwin/newt-agent
      - uses: actions/upload-artifact@v4
        with:
          name: agent-x86_64-apple-darwin
          path: agents/x86_64-apple-darwin/
          retention-days: 7

  # ─── Stage 2: Build frontend once ───

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
      - run: yarn install --frozen-lockfile
      - run: yarn build
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/
          retention-days: 7
      - name: Extract version
        run: |
          VERSION=$(grep -m1 '^version' src-tauri/Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
          echo "$VERSION" > version.txt
      - uses: actions/upload-artifact@v4
        with:
          name: build-metadata
          path: version.txt
          retention-days: 7

  # ─── Stage 3: Per-distro build + package ───

  package:
    name: Package (${{ matrix.name }})
    runs-on: ubuntu-latest
    container: ${{ matrix.container }}
    needs: [agent-x86_64-linux, agent-aarch64-linux, agent-aarch64-darwin, agent-x86_64-darwin, frontend]
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Debian 12
            container: debian:12
            distro: debian12
            pkg_type: deb
            install_deps: |
              apt-get update
              apt-get install -y curl build-essential pkg-config git python3 \
                libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev
            runtime_deps: "libwebkit2gtk-4.1-0, libgtk-3-0, libayatana-appindicator3-1"

          - name: Ubuntu 22.04
            container: ubuntu:22.04
            distro: ubuntu2204
            pkg_type: deb
            install_deps: |
              export DEBIAN_FRONTEND=noninteractive
              apt-get update
              apt-get install -y curl build-essential pkg-config git python3 \
                libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev
            runtime_deps: "libwebkit2gtk-4.1-0, libgtk-3-0, libayatana-appindicator3-1"

          - name: Ubuntu 24.04
            container: ubuntu:24.04
            distro: ubuntu2404
            pkg_type: deb
            install_deps: |
              export DEBIAN_FRONTEND=noninteractive
              apt-get update
              apt-get install -y curl build-essential pkg-config git python3 \
                libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev
            runtime_deps: "libwebkit2gtk-4.1-0, libgtk-3-0t64, libayatana-appindicator3-1"

          - name: Fedora 41
            container: fedora:41
            distro: fedora41
            pkg_type: rpm
            install_deps: |
              dnf install -y gcc g++ make pkg-config git python3 \
                webkit2gtk4.1-devel gtk3-devel librsvg2-devel rpm-build

          - name: Fedora 42
            container: fedora:42
            distro: fedora42
            pkg_type: rpm
            install_deps: |
              dnf install -y gcc g++ make pkg-config git python3 \
                webkit2gtk4.1-devel gtk3-devel librsvg2-devel rpm-build

          - name: Arch Linux
            container: archlinux:latest
            distro: arch
            pkg_type: arch
            install_deps: |
              pacman -Syu --noconfirm
              pacman -S --noconfirm base-devel pkgconf git python \
                webkit2gtk-4.1 gtk3 librsvg libarchive

    steps:
      - name: Install system dependencies
        run: ${{ matrix.install_deps }}

      - uses: actions/checkout@v4

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Cache Cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ matrix.distro }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-${{ matrix.distro }}-

      - name: Download frontend
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist/

      - name: Download build metadata
        uses: actions/download-artifact@v4
        with:
          name: build-metadata

      - name: Download agent artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: agent-*
          path: agents/
          merge-multiple: false

      - name: Arrange agent artifacts
        run: |
          cd agents
          for dir in agent-*/; do
            triple="${dir#agent-}"
            triple="${triple%/}"
            mkdir -p "$triple"
            cp -r "$dir"* "$triple/"
            rm -rf "$dir"
          done
          chmod +x */newt-agent

      - name: Build binary
        env:
          NEWT_SYSTEM_AGENT_DIR: /usr/share/newt/agents
          CARGO_PROFILE_RELEASE_STRIP: symbols
        run: |
          . "$HOME/.cargo/env"
          cargo build --release -p newt --features custom-protocol

      - name: Build .deb
        if: matrix.pkg_type == 'deb'
        env:
          VERSION: ${{ needs.frontend.outputs.version }}
          DEPS: ${{ matrix.runtime_deps }}
          DISTRO: ${{ matrix.distro }}
        run: |
          export VERSION=$(cat version.txt)
          packaging/debian/build-deb.sh

      - name: Build .rpm
        if: matrix.pkg_type == 'rpm'
        run: |
          . "$HOME/.cargo/env"
          VERSION=$(cat version.txt)
          rpmbuild -bb packaging/rpm/newt.spec \
            --define "_topdir $(pwd)/rpmbuild" \
            --define "_newt_version $VERSION" \
            --define "_newt_binary $(pwd)/target/release/newt" \
            --define "_newt_agent_dir $(pwd)/agents"
          cp rpmbuild/RPMS/x86_64/*.rpm .

      - name: Build .pkg.tar.zst
        if: matrix.pkg_type == 'arch'
        run: |
          export VERSION=$(cat version.txt)
          packaging/arch/build-pkg.sh

      - uses: actions/upload-artifact@v4
        with:
          name: package-${{ matrix.distro }}
          path: |
            *.deb
            *.rpm
            *.pkg.tar.zst
          retention-days: 7
