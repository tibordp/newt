name: Package

on:
  workflow_dispatch:
    inputs:
      set:
        description: Artifact set
        type: choice
        options: [lean, full]
        default: lean

env:
  CARGO_TERM_COLOR: always

jobs:
  # ─── Stage 0: Resolve the artifact set into build matrices ───
  #
  # lean (default): x86_64 Windows + Linux (AppImage + latest major of
  # each supported distro) and aarch64 macOS.
  # full: everything — all distro releases, the arm64 Linux mirror,
  # aarch64 Windows and x86_64 macOS.
  # Linux legs live in .github/package-matrix.yml (tier-tagged).

  plan:
    name: Plan
    runs-on: ubuntu-latest
    outputs:
      linux: ${{ steps.plan.outputs.linux }}
      macos: ${{ steps.plan.outputs.macos }}
      windows: ${{ steps.plan.outputs.windows }}
    steps:
      - uses: actions/checkout@v6
      - id: plan
        env:
          SET: ${{ inputs.set }}
        run: |
          python3 - <<'EOF' >> "$GITHUB_OUTPUT"
          import json, os, yaml

          full = os.environ["SET"] == "full"
          linux = []
          for leg in yaml.safe_load(open(".github/package-matrix.yml")):
              if not full and leg["tier"] != "lean":
                  continue
              if not full and leg.get("lean_pkg") is False:
                  leg["skip_pkg"] = True
              linux.append(leg)

          macos = [{"arch": "aarch64", "target": "aarch64-apple-darwin"}]
          windows = [{"arch": "x86_64", "target": "x86_64-pc-windows-msvc"}]
          if full:
              macos.append({"arch": "x86_64", "target": "x86_64-apple-darwin"})
              windows.append({"arch": "aarch64", "target": "aarch64-pc-windows-msvc"})

          for key, legs in {"linux": linux, "macos": macos, "windows": windows}.items():
              print(f"{key}={json.dumps(legs)}")
          EOF
  # ─── Stage 1: Build agent binaries ───

  agent:
    name: Agent (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    # One shared target dir (cargo's default location) so
    # Swatinem/rust-cache actually caches the agent build. Each job
    # builds a single triple and nothing else, so xtask's per-triple
    # split (local default) buys nothing here. Set job-wide so the
    # rust-cache step sees it too.
    env:
      CARGO_TARGET_DIR: target
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-latest
          - target: aarch64-apple-darwin
            runner: macos-latest
          - target: x86_64-apple-darwin
            runner: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: agent-${{ matrix.target }}
      # Linux-musl targets cross-compile via cargo-zigbuild. Zig 0.16
      # ships a broken `ar` that fails to create archives for C -sys
      # crates (aws-lc-sys, bzip2-sys, etc.) — stay on 0.15 until
      # cargo-zigbuild supports the newer llvm-ar behavior.
      - name: Install zig
        if: contains(matrix.target, 'linux-musl')
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.1
      - name: Install cargo-zigbuild
        if: contains(matrix.target, 'linux-musl')
        run: cargo install cargo-zigbuild --version 0.22.2 --locked
      - name: Build agent
        env:
          CARGO_PROFILE_RELEASE_STRIP: symbols
        run: cargo xtask agents ${{ matrix.target }}
      - uses: actions/upload-artifact@v6
        with:
          name: agent-${{ matrix.target }}
          path: agents/${{ matrix.target }}/
          retention-days: 7
          if-no-files-found: error

  # ─── Stage 2: Build frontend once ───

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v6
        with:
          name: frontend-dist
          path: dist/
          retention-days: 7
          if-no-files-found: error
      - name: Extract version
        id: version
        run: |
          VERSION=$(grep -m1 '^version' src-tauri/Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  # ─── Stage 3: Per-distro build + package ───

  package:
    name: Package (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.container }}
    needs: [plan, agent, frontend]
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.plan.outputs.linux) }}

    steps:
      - name: Install system dependencies
        run: |
          case "${{ matrix.pkg_type }}" in
            deb)
              export DEBIAN_FRONTEND=noninteractive
              apt-get update
              apt-get install -y curl build-essential pkg-config git python3 \
                libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev
              ;;
            rpm)
              dnf install -y gcc g++ make pkg-config git python3 \
                webkit2gtk4.1-devel gtk3-devel librsvg2-devel rpm-build
              ;;
            arch)
              pacman -Syu --noconfirm
              pacman -S --noconfirm base-devel pkgconf git python \
                webkit2gtk-4.1 gtk3 librsvg libarchive
              ;;
          esac

      - uses: actions/checkout@v6

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Cache Cargo registry + build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ matrix.distro }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-${{ matrix.distro }}-

      - name: Download frontend
        uses: actions/download-artifact@v8
        with:
          name: frontend-dist
          path: dist/

      - name: Download agent artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: agent-*
          path: agents/
          merge-multiple: false

      - name: Arrange agent artifacts
        run: |
          cd agents
          for dir in agent-*/; do
            triple="${dir#agent-}"
            triple="${triple%/}"
            mkdir -p "$triple"
            cp -r "$dir"* "$triple/"
            rm -rf "$dir"
          done
          chmod +x */newt-agent

      - name: Build binary
        env:
          NEWT_SYSTEM_AGENT_DIR: /usr/share/newt/agents
          CARGO_PROFILE_RELEASE_STRIP: symbols
        run: |
          . "$HOME/.cargo/env"
          cargo build --release -p newt --features custom-protocol

      - name: Build .deb
        if: matrix.pkg_type == 'deb' && !matrix.skip_pkg
        env:
          VERSION: ${{ needs.frontend.outputs.version }}
          DEPS: ${{ matrix.runtime_deps }}
          DISTRO: ${{ matrix.distro }}
          ARCH: ${{ matrix.deb_arch || 'amd64' }}
        run: packaging/debian/build-deb.sh

      - name: Build .rpm
        if: matrix.pkg_type == 'rpm'
        env:
          VERSION: ${{ needs.frontend.outputs.version }}
        run: |
          rpmbuild -bb packaging/rpm/newt.spec \
            --define "_topdir $(pwd)/rpmbuild" \
            --define "_newt_srcdir $(pwd)" \
            --define "_newt_version $VERSION" \
            --define "_newt_binary $(pwd)/target/release/newt" \
            --define "_newt_agent_dir $(pwd)/agents"
          cp "rpmbuild/RPMS/$(uname -m)"/*.rpm .

      - name: Build .pkg.tar.zst
        if: matrix.pkg_type == 'arch'
        env:
          VERSION: ${{ needs.frontend.outputs.version }}
        run: packaging/arch/build-pkg.sh

      # Slim try-it-out artifact: same binary/payload as the .deb, no
      # bundled libraries (needs system WebKitGTK 4.1 — same runtime
      # deps as the native packages). Deliberately not `cargo tauri
      # build --bundles appimage`: tauri's bundler forces
      # GDK_BACKEND=x11 / GTK_THEME and its exports leak into shells
      # spawned from Newt's terminal.
      - name: Build AppImage
        if: matrix.appimage
        env:
          VERSION: ${{ needs.frontend.outputs.version }}
          ARCH: ${{ matrix.appimage_arch }}
          # The container has no FUSE; run appimagetool extracted.
          APPIMAGE_EXTRACT_AND_RUN: "1"
        run: |
          apt-get install -y file
          curl -fsSL --retry 3 -o /usr/local/bin/appimagetool \
            "https://github.com/AppImage/appimagetool/releases/download/1.9.1/appimagetool-${ARCH}.AppImage"
          chmod +x /usr/local/bin/appimagetool
          packaging/appimage/build-appimage.sh

      - uses: actions/upload-artifact@v6
        if: matrix.appimage
        with:
          name: package-appimage-${{ matrix.appimage_arch }}
          path: "*.AppImage"
          retention-days: 7
          if-no-files-found: error

      - uses: actions/upload-artifact@v6
        if: ${{ !matrix.skip_pkg }}
        with:
          name: package-${{ matrix.distro }}
          path: |
            *.deb
            *.rpm
            *.pkg.tar.zst
          retention-days: 7
          if-no-files-found: error

  # ─── Stage 3b: macOS .dmg ───

  # Both legs build on the arm runner; the x86_64 leg (full set only)
  # cross-compiles, so --target is always explicit.
  package-macos:
    name: Package (macOS ${{ matrix.arch }})
    runs-on: macos-latest
    needs: [plan, agent, frontend]
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.plan.outputs.macos) }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: app-macos-${{ matrix.arch }}
      # Prebuilt from the tauri-cli release — compiling it via
      # `cargo install` costs minutes per cache miss.
      - name: Install tauri-cli
        run: |
          curl -fsSL --retry 3 -o cargo-tauri.zip \
            https://github.com/tauri-apps/tauri/releases/download/tauri-cli-v2.11.4/cargo-tauri-aarch64-apple-darwin.zip
          tar -xf cargo-tauri.zip -C "$HOME/.cargo/bin" cargo-tauri
          chmod +x "$HOME/.cargo/bin/cargo-tauri"
          rm cargo-tauri.zip
          cargo tauri --version
      - name: Download frontend
        uses: actions/download-artifact@v8
        with:
          name: frontend-dist
          path: dist/
      - name: Download agent artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: agent-*
          path: agents/
          merge-multiple: false
      - name: Arrange agent artifacts
        run: |
          cd agents
          for dir in agent-*/; do
            triple="${dir#agent-}"
            triple="${triple%/}"
            mkdir -p "$triple"
            cp -r "$dir"* "$triple/"
            rm -rf "$dir"
          done
          chmod +x */newt-agent
      - name: Build Tauri app
        run: >
          cargo tauri build
          --target ${{ matrix.target }}
          --bundles dmg
          --config '{"build":{"beforeBuildCommand":""}}'
      - uses: actions/upload-artifact@v6
        with:
          name: package-macos-${{ matrix.arch }}
          path: target/${{ matrix.target }}/release/bundle/dmg/*.dmg
          retention-days: 7
          if-no-files-found: error

  # ─── Stage 3c: Windows .msi ───
  #
  # Both arches cross-compile on the x86_64 `windows-latest` runner (the
  # MSVC toolchain there carries the ARM64 cross tools), mirroring the
  # Linux x86-runner pattern. The stage-1 Linux/macOS agents are bundled
  # as on every other platform — you remote *from* Windows into those.
  # The one thing Windows-specific: there is no remoting *into* Windows
  # from another platform (or another Windows arch), so the Windows agent
  # is only ever shipped here, and only for the build's own arch. It is
  # built inline for the build triple alongside the cross agents.

  package-windows:
    name: Package (Windows ${{ matrix.arch }})
    runs-on: windows-latest
    needs: [plan, agent, frontend]
    # Shared target dir so the inline agent build and the Tauri app
    # build reuse deps and are both covered by rust-cache (xtask honours
    # this instead of its local per-triple split). Must be absolute: a
    # relative CARGO_TARGET_DIR resolves against each cargo invocation's
    # cwd, and `cargo tauri build` runs cargo from src-tauri/ — so
    # `target` would split the builds and strand the .msi in
    # src-tauri/target/ where the upload step never looks.
    env:
      CARGO_TARGET_DIR: ${{ github.workspace }}/target
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.plan.outputs.windows) }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: app-windows-${{ matrix.arch }}
      # aws-lc-sys / ring assemble with NASM on Windows MSVC targets.
      - name: Install NASM
        run: choco install nasm --no-progress -y
      # Prebuilt from the tauri-cli release — compiling it via
      # `cargo install` costs minutes per cache miss. x86_64 CLI on
      # both legs: the aarch64 app build cross-compiles on this
      # x86_64 runner.
      - name: Install tauri-cli
        shell: bash
        run: |
          curl -fsSL --retry 3 -o cargo-tauri.zip \
            https://github.com/tauri-apps/tauri/releases/download/tauri-cli-v2.11.4/cargo-tauri-x86_64-pc-windows-msvc.zip
          # No unzip on the runner (and Git Bash's tar is GNU tar, which
          # can't read zip); 7z is preinstalled.
          7z e cargo-tauri.zip cargo-tauri.exe -y
          mv cargo-tauri.exe "$HOME/.cargo/bin/"
          rm cargo-tauri.zip
          cargo tauri --version
      - name: Download frontend
        uses: actions/download-artifact@v8
        with:
          name: frontend-dist
          path: dist/
      - name: Download agent artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: agent-*
          path: agents/
          merge-multiple: false
      - name: Arrange agent artifacts
        shell: bash
        run: |
          cd agents
          for dir in agent-*/; do
            triple="${dir#agent-}"
            triple="${triple%/}"
            mkdir -p "$triple"
            cp -r "$dir"* "$triple/"
            rm -rf "$dir"
          done
          chmod +x */newt-agent
      # Add this build's own-arch Windows agent next to the cross agents.
      # The Windows agent ships only on Windows, same-arch only.
      - name: Build agent (${{ matrix.target }})
        env:
          CARGO_PROFILE_RELEASE_STRIP: symbols
        run: cargo xtask agents ${{ matrix.target }}
      # bash (Git for Windows) so the single-quoted --config JSON survives
      # verbatim; PowerShell would mangle it.
      - name: Build Tauri app
        shell: bash
        run: >
          cargo tauri build
          --target ${{ matrix.target }}
          --bundles msi
          --config '{"build":{"beforeBuildCommand":""}}'
      - uses: actions/upload-artifact@v6
        with:
          name: package-windows-${{ matrix.arch }}
          path: target/${{ matrix.target }}/release/bundle/msi/*.msi
          retention-days: 7
          if-no-files-found: error
