<!DOCTYPE html>
<!--
  autocorrect / autocapitalize / spellcheck are inherited by descendant
  inputs and textareas. Disabling them at the root keeps macOS WebKit from
  silently mangling typed paths, regex patterns, and shell commands the way
  Linux WebKit (which doesn't apply these by default) leaves alone. Each
  field is free to opt back in by setting the attribute explicitly.
-->
<html lang="en" autocorrect="off" autocapitalize="off" spellcheck="false">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script type="module" src="/src/main.tsx"></script>
    <title>Newt</title>
    <style>
      @media (prefers-color-scheme: dark) {
        html:not([data-theme="light"]) body { background: #1e1e1e; }
      }
      [data-theme="dark"] body { background: #1e1e1e; }
    </style>
  </head>

  <body>
    <div id="root"></div>
  </body>
</html>
