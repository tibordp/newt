[package]
name = "newt-common"
version = "0.1.0"
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
serde = { version = "1.0", features = ["derive"] }
thiserror = "1"
notify = "6.0"
parking_lot = "0.12"
tokio = { version = "1", features = ["full"] }
libc = "*"
tokio-util = { version = "0.7.8", features = ["codec"] }
pty-process = { path = "../pty-process" }
async-trait = "0.1.68"
log = "0.4"
bytes = { version = "1.4.0", features = ["std", "serde"] }
byteorder = "1.4.3"
futures = "0.3.28"
tokio-stream = "0.1.14"
bincode = "1.3.3"
nix = { version = "0.26.2", features = ["fs"] }
